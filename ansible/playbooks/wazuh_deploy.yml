---
- name: Validate domain controller reachability before Wazuh deployment
  hosts: directory_services
  gather_facts: false
  tasks:
    - name: Wait for WinRM connectivity to domain controller
      ansible.builtin.wait_for_connection:
        timeout: 900

- name: Deploy and validate Wazuh manager stack
  hosts: wazuh_manager
  gather_facts: true
  become: true
  roles:
    - role: wazuh
