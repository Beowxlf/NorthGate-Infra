---
- name: Assert supported operating system
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
    fail_msg: "Caldera role supports only Debian or RedHat families"

- name: Install Caldera prerequisite packages
  ansible.builtin.package:
    name: "{{ caldera_install_packages[ansible_os_family] }}"
    state: present

- name: Create Caldera service group
  ansible.builtin.group:
    name: "{{ caldera_group }}"
    state: present

- name: Create Caldera service user
  ansible.builtin.user:
    name: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure Caldera installation root exists
  ansible.builtin.file:
    path: "{{ caldera_install_root }}"
    state: directory
    owner: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    mode: "0755"

- name: Checkout MITRE Caldera release
  ansible.builtin.git:
    repo: "{{ caldera_repo_url }}"
    dest: "{{ caldera_install_root }}"
    version: "{{ caldera_version }}"
    force: true
  notify: Restart caldera

- name: Create Caldera Python virtual environment
  ansible.builtin.command:
    cmd: "{{ caldera_python_interpreter }} -m venv {{ caldera_venv_path }}"
    creates: "{{ caldera_venv_path }}/bin/activate"

- name: Install Caldera Python dependencies
  ansible.builtin.pip:
    requirements: "{{ caldera_install_root }}/requirements.txt"
    virtualenv: "{{ caldera_venv_path }}"
  notify: Restart caldera

- name: Configure Caldera local settings
  ansible.builtin.template:
    src: local.yml.j2
    dest: "{{ caldera_install_root }}/conf/local.yml"
    owner: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    mode: "0640"
  notify: Restart caldera

- name: Install Caldera systemd service
  ansible.builtin.template:
    src: caldera.service.j2
    dest: "/etc/systemd/system/{{ caldera_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify: Restart caldera

- name: Ensure Caldera installation ownership
  ansible.builtin.file:
    path: "{{ caldera_install_root }}"
    owner: "{{ caldera_user }}"
    group: "{{ caldera_group }}"
    recurse: true

- name: Start and enable Caldera service
  ansible.builtin.systemd:
    name: "{{ caldera_service_name }}"
    daemon_reload: true
    state: started
    enabled: true

- name: Wait for Caldera API port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ caldera_bind_port }}"
    timeout: 120
