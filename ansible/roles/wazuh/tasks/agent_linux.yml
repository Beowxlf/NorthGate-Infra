---
- name: Install apt transport prerequisites for Wazuh agent
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - gnupg
    state: present
    update_cache: true
  when: ansible_os_family == 'Debian'

- name: Add Wazuh apt signing key
  ansible.builtin.apt_key:
    url: "{{ wazuh_agent_apt_gpg_key_url }}"
    state: present
  when: ansible_os_family == 'Debian'

- name: Add Wazuh apt repository
  ansible.builtin.apt_repository:
    repo: "{{ wazuh_agent_apt_repository }}"
    state: present
    filename: wazuh
  when: ansible_os_family == 'Debian'

- name: Add Wazuh yum repository
  ansible.builtin.yum_repository:
    name: wazuh
    description: Wazuh repository
    baseurl: "{{ wazuh_agent_yum_repository }}"
    gpgcheck: true
    gpgkey: "{{ wazuh_agent_yum_gpg_key_url }}"
    enabled: true
  when: ansible_os_family == 'RedHat'

- name: Install Wazuh Linux agent package
  ansible.builtin.package:
    name: wazuh-agent
    state: present

- name: Render Wazuh Linux agent configuration
  ansible.builtin.template:
    src: wazuh_agent_ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: root
    mode: "0640"
  notify: Restart wazuh agent linux

- name: Ensure Wazuh Linux agent service is enabled and started
  ansible.builtin.service:
    name: wazuh-agent
    enabled: true
    state: started

- name: Enroll Linux agent with manager authd
  ansible.builtin.command:
    cmd: "/var/ossec/bin/agent-auth -m {{ wazuh_resolved_manager_host }}"
    creates: /var/ossec/etc/client.keys
  register: wazuh_linux_agent_enrollment
  changed_when: wazuh_linux_agent_enrollment.rc == 0

- name: Generate deterministic Linux endpoint validation log marker
  ansible.builtin.command:
    cmd: "logger -t {{ wazuh_linux_log_tag }} {{ wazuh_linux_log_message }}"
  changed_when: true
