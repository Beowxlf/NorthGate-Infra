---
# Installation behavior
wazuh_version: "4.14.4"
wazuh_force_redeploy: false
wazuh_redeploy_on_config_change: false
wazuh_install_root: /opt/wazuh-install
wazuh_install_script_url: "https://packages.wazuh.com/{{ wazuh_version }}/wazuh-install.sh"
wazuh_install_script_path: "{{ wazuh_install_root }}/wazuh-install.sh"

# Package prerequisites (no pre-installed assumptions)
wazuh_prerequisite_packages:
  Debian:
    - curl
    - tar
  RedHat:
    - curl
    - tar

# Single-node all-in-one defaults (manager + indexer + dashboard)
wazuh_config_template_path: "{{ wazuh_install_root }}/config.yml"
wazuh_node_name: "wazuh-single-node"
wazuh_node_ip: "{{ ansible_default_ipv4.address }}"
wazuh_indexer_cluster_name: "wazuh"
wazuh_indexer_port: 9200
wazuh_dashboard_port: 443
wazuh_api_port: 55000
wazuh_agent_enrollment_port: 1515
wazuh_agent_events_port: 1514

# Service expectations
wazuh_services:
  - wazuh-manager
  - wazuh-indexer
  - wazuh-dashboard

# Optional post-install manager tuning template
wazuh_manager_local_internal_options_path: /var/ossec/etc/local_internal_options.conf
wazuh_manager_local_internal_options:
  - "analysisd.min_rotate_interval=10"
  - "wazuh_db.sync_interval=5"
