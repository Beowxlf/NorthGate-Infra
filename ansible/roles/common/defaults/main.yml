---
# Package maintenance
common_manage_packages: true
common_package_upgrade: true
common_apt_cache_valid_time: 3600

# Baseline tools
common_basic_tools:
  - curl
  - git
  - rsync
  - vim
  - wget

# Standard user
common_standard_user_name: ops
common_standard_user_comment: Standard Operations User
common_standard_user_shell: /bin/bash
common_standard_user_create_home: true
common_standard_user_groups:
  Debian: ["sudo"]
  RedHat: ["wheel"]
  Suse: ["wheel"]
common_standard_user_fallback_group: sudo

# SSH hardening
common_ssh_manage: true
common_ssh_service_names:
  Debian: ssh
  RedHat: sshd
  Suse: sshd
common_ssh_settings:
  - { regexp: '^#?PermitRootLogin\\s+', line: 'PermitRootLogin no' }
  - { regexp: '^#?PasswordAuthentication\\s+', line: 'PasswordAuthentication no' }
  - { regexp: '^#?PubkeyAuthentication\\s+', line: 'PubkeyAuthentication yes' }
  - { regexp: '^#?ChallengeResponseAuthentication\\s+', line: 'ChallengeResponseAuthentication no' }
  - { regexp: '^#?X11Forwarding\\s+', line: 'X11Forwarding no' }
  - { regexp: '^#?ClientAliveInterval\\s+', line: 'ClientAliveInterval 300' }
  - { regexp: '^#?ClientAliveCountMax\\s+', line: 'ClientAliveCountMax 2' }
  - { regexp: '^#?LoginGraceTime\\s+', line: 'LoginGraceTime 30' }
  - { regexp: '^#?MaxAuthTries\\s+', line: 'MaxAuthTries 3' }

# Time synchronization
common_time_sync_manage: true
common_time_sync_packages:
  Debian: chrony
  RedHat: chrony
  Suse: chrony
common_time_sync_services:
  Debian: chrony
  RedHat: chronyd
  Suse: chronyd
