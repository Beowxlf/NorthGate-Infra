---
app_runtime_enabled: true
app_runtime_project_name: scrambleiq

app_runtime_repo_url: https://github.com/Beowxlf/ScrambleIQ.git
app_runtime_repo_ref: ca190cc12af74ddb1967bb2148da41cfa24b5b67
app_runtime_checkout_dir: /opt/scrambleiq/source
app_runtime_packaging_dir: /workspace/NorthGate-Infra/app

app_runtime_network_name: scrambleiq_net

app_runtime_api_image: scrambleiq-api:ca190cc12a
app_runtime_web_image: scrambleiq-web:ca190cc12a
app_runtime_pull: false
app_runtime_restart_policy: unless-stopped

app_runtime_host_http_port: 80

app_runtime_api_container_name: scrambleiq-api
app_runtime_web_container_name: scrambleiq-web
app_runtime_db_container_name: scrambleiq-db

app_runtime_api_env_file_path: /etc/scrambleiq/api.env
app_runtime_api_env:
  NODE_ENV: production
  PORT: "3000"
  WEB_ORIGIN: http://localhost
  API_AUTH_TOKEN: CHANGE_ME
  DATABASE_URL: postgresql://scrambleiq:CHANGE_ME@scrambleiq-db:5432/scrambleiq

app_runtime_web_build_args:
  VITE_API_BASE_URL: /api
  VITE_API_AUTH_TOKEN: CHANGE_ME

app_runtime_database_image: postgres:16.8-alpine3.21
app_runtime_database_volume: scrambleiq_db_data
app_runtime_database_env:
  POSTGRES_DB: scrambleiq
  POSTGRES_USER: scrambleiq
  POSTGRES_PASSWORD: CHANGE_ME
