---
- name: Validate required deterministic app_runtime values
  ansible.builtin.assert:
    that:
      - app_runtime_repo_ref is match('^[0-9a-f]{40}$')
      - app_runtime_api_env.API_AUTH_TOKEN != 'CHANGE_ME'
      - app_runtime_database_env.POSTGRES_PASSWORD != 'CHANGE_ME'
      - app_runtime_web_build_args.VITE_API_AUTH_TOKEN != 'CHANGE_ME'
    fail_msg: "Set pinned repo ref and non-placeholder auth/database credentials before deployment."

- name: Install runtime prerequisites
  ansible.builtin.package:
    name:
      - git
      - docker.io
      - python3-docker
    state: present

- name: Ensure docker daemon enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ensure ScrambleIQ config directory exists
  ansible.builtin.file:
    path: /etc/scrambleiq
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Checkout pinned ScrambleIQ source
  ansible.builtin.git:
    repo: "{{ app_runtime_repo_url }}"
    dest: "{{ app_runtime_checkout_dir }}"
    version: "{{ app_runtime_repo_ref }}"
    force: true

- name: Render API environment file
  ansible.builtin.template:
    src: scrambleiq.env.j2
    dest: "{{ app_runtime_api_env_file_path }}"
    owner: root
    group: root
    mode: '0640'
  vars:
    env_map: "{{ app_runtime_api_env }}"

- name: Build ScrambleIQ API image
  community.docker.docker_image_build:
    name: "{{ app_runtime_api_image }}"
    path: "{{ app_runtime_checkout_dir }}"
    dockerfile: "{{ app_runtime_packaging_dir }}/Dockerfile"
    pull: false

- name: Build ScrambleIQ web image
  community.docker.docker_image_build:
    name: "{{ app_runtime_web_image }}"
    path: "{{ app_runtime_checkout_dir }}"
    dockerfile: "{{ app_runtime_packaging_dir }}/Dockerfile.web"
    pull: false
    build:
      args: "{{ app_runtime_web_build_args }}"

- name: Ensure ScrambleIQ container network exists
  community.docker.docker_network:
    name: "{{ app_runtime_network_name }}"
    state: present

- name: Deploy ScrambleIQ database container
  community.docker.docker_container:
    name: "{{ app_runtime_db_container_name }}"
    image: "{{ app_runtime_database_image }}"
    restart_policy: "{{ app_runtime_restart_policy }}"
    env: "{{ app_runtime_database_env }}"
    networks:
      - name: "{{ app_runtime_network_name }}"
    volumes:
      - "{{ app_runtime_database_volume }}:/var/lib/postgresql/data"
    exposed_ports:
      - "5432"
    state: started

- name: Deploy ScrambleIQ API container
  community.docker.docker_container:
    name: "{{ app_runtime_api_container_name }}"
    image: "{{ app_runtime_api_image }}"
    restart_policy: "{{ app_runtime_restart_policy }}"
    env_file: "{{ app_runtime_api_env_file_path }}"
    networks:
      - name: "{{ app_runtime_network_name }}"
    exposed_ports:
      - "3000"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    state: started

- name: Deploy ScrambleIQ web/reverse-proxy container
  community.docker.docker_container:
    name: "{{ app_runtime_web_container_name }}"
    image: "{{ app_runtime_web_image }}"
    restart_policy: "{{ app_runtime_restart_policy }}"
    networks:
      - name: "{{ app_runtime_network_name }}"
    ports:
      - "{{ app_runtime_host_http_port }}:80"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "5"
    state: started
