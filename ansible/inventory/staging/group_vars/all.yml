---
# Environment identity
ng_environment: staging
ng_phase: 7

# Control-node execution contract
ng_control_node: stg-mgmt-ansible-01
ansible_user: svc_ansible
ansible_ssh_common_args: >-
  -o ControlMaster=auto
  -o ControlPersist=30m
  -o StrictHostKeyChecking=yes

# Terraform/OpenTofu dynamic inventory contract (generated artifact path)
ng_terraform_inventory_artifact: ../terraform/out/staging-ansible-inventory.json
ng_terraform_output_keys:
  - hosts
  - ip_addresses
  - dns_names
  - access_paths

# Default interpreter for Linux targets
ansible_python_interpreter: /usr/bin/python3
