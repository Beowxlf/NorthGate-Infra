name: Infrastructure Validation and Promotion

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environment to validate/apply (test-core|staging|production)"
        required: true
        default: test-core
        type: choice
        options:
          - test-core
          - staging
          - production
      source_environment:
        description: "Promotion source environment"
        required: false
        default: test-core
        type: choice
        options:
          - test-core
          - staging
      promote:
        description: "Allow promotion for selected target environment"
        required: false
        default: false
        type: boolean
      release_version:
        description: "Infrastructure version label (example: infra-2026.03.21.1)"
        required: false
        default: "infra-UNSET"
        type: string
      rollback_to_version:
        description: "Optional rollback version label"
        required: false
        default: ""
        type: string
      simulate_promotion_failure:
        description: "Fail promotion gate intentionally for validation"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [test-core, staging, production]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Terraform formatting and validation
        run: |
          terraform -chdir=terraform/environments/${{ matrix.environment }} init -backend=false
          terraform -chdir=terraform/environments/${{ matrix.environment }} fmt -check -recursive
          terraform -chdir=terraform/environments/${{ matrix.environment }} validate

      - name: Ansible lint and syntax
        run: |
          ansible-lint ansible/playbooks/*.yml
          ansible-playbook -i ansible/inventory/${{ matrix.environment }}/hosts.yml ansible/playbooks/phase_3_detection_platform.yml --syntax-check
          ansible-playbook -i ansible/inventory/${{ matrix.environment }}/hosts.yml ansible/playbooks/phase_5_validation_hooks.yml --syntax-check

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
      - name: Packer init and validate
        run: |
          packer init packer/linux-base/template.pkr.hcl
          packer validate packer/linux-base/template.pkr.hcl
          packer init packer/windows-base/template.pkr.hcl
          packer validate packer/windows-base/template.pkr.hcl

  provision:
    runs-on: ubuntu-latest
    needs: build
    env:
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'test-core' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform plan simulation for selected environment
        run: |
          terraform -chdir=terraform/environments/${TARGET_ENV} init -backend=false
          terraform -chdir=terraform/environments/${TARGET_ENV} plan -refresh=false -lock=false -input=false -var-file=terraform.tfvars.example -out=tfplan

  configure:
    runs-on: ubuntu-latest
    needs: provision
    env:
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'test-core' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible and jq
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Ansible configuration validation hooks
        run: |
          ansible-playbook -i ansible/inventory/${TARGET_ENV}/hosts.yml ansible/playbooks/phase_5_validation_hooks.yml --check

  detection_validation:
    runs-on: ubuntu-latest
    needs: configure
    env:
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'test-core' }}
      CALDERA_URL: ${{ secrets.CALDERA_URL }}
      CALDERA_API_KEY: ${{ secrets.CALDERA_API_KEY }}
      WAZUH_URL: ${{ secrets.WAZUH_URL }}
      WAZUH_USERNAME: ${{ secrets.WAZUH_USERNAME }}
      WAZUH_PASSWORD: ${{ secrets.WAZUH_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Skip detection validation outside test-core
        if: env.TARGET_ENV != 'test-core'
        run: echo "Detection validation is executed in test-core promotion source only."
      - name: Install dependencies
        if: env.TARGET_ENV == 'test-core'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Detection validation
        if: env.TARGET_ENV == 'test-core'
        run: scripts/run_detection_validation.sh phase3_blue_team_validation

  failure_validation:
    runs-on: ubuntu-latest
    needs: detection_validation
    env:
      SIMULATE_PROMOTION_FAILURE: ${{ github.event.inputs.simulate_promotion_failure == 'true' && '1' || '0' }}
    steps:
      - name: Simulated failure gate
        run: |
          if [[ "${SIMULATE_PROMOTION_FAILURE}" == "1" ]]; then
            echo "Promotion gate intentionally failed" >&2
            exit 1
          fi
          echo "Failure validation gate passed"

  create_release_marker:
    runs-on: ubuntu-latest
    needs: failure_validation
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Persist infrastructure release metadata
        run: |
          mkdir -p artifacts
          cat > artifacts/infrastructure-release.json <<JSON
          {
            "release_version": "${{ github.event.inputs.release_version }}",
            "commit_sha": "${{ github.sha }}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          cat artifacts/infrastructure-release.json
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-release
          path: artifacts/infrastructure-release.json

  promote_staging:
    runs-on: ubuntu-latest
    needs: create_release_marker
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.promote == 'true' &&
      github.event.inputs.target_environment == 'staging' &&
      github.event.inputs.source_environment == 'test-core'
    environment: staging
    steps:
      - name: Promotion authorization to staging
        run: |
          echo "Promotion approved: test-core -> staging"
          echo "Release version: ${{ github.event.inputs.release_version }}"

  promote_production:
    runs-on: ubuntu-latest
    needs: create_release_marker
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.promote == 'true' &&
      github.event.inputs.target_environment == 'production' &&
      github.event.inputs.source_environment == 'staging'
    environment: production
    steps:
      - name: Promotion authorization to production
        run: |
          echo "Promotion approved: staging -> production"
          echo "Release version: ${{ github.event.inputs.release_version }}"

  rollback:
    runs-on: ubuntu-latest
    needs: [promote_staging, promote_production]
    if: |
      always() && github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_to_version != ''
    steps:
      - name: Execute rollback contract
        run: |
          echo "Rollback requested to version: ${{ github.event.inputs.rollback_to_version }}"
          echo "Operator must execute deterministic rollback runbook from docs/05-operations/environment-lifecycle.md"
